services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tumulty_audit_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - tumulty_audit
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: tumulty_audit_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tumulty_audit
    depends_on:
      - app

  db:
    image: postgres:17-alpine
    container_name: tumulty_audit_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tumulty_audit}
      POSTGRES_USER: ${DB_USERNAME:-sail}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - tumulty_audit_pgdata:/var/lib/postgresql/data
    networks:
      - tumulty_audit

networks:
  tumulty_audit:
    driver: bridge

volumes:
  tumulty_audit_pgdata:
    driver: local
