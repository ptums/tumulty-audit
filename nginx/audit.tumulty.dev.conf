# Host Nginx config — place at /etc/nginx/sites-available/audit.tumulty.dev
# then: sudo ln -s /etc/nginx/sites-available/audit.tumulty.dev /etc/nginx/sites-enabled/
# then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name audit.tumulty.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name audit.tumulty.dev;

    ssl_certificate     /etc/letsencrypt/live/audit.tumulty.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/audit.tumulty.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }
}
